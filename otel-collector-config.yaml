# otel-collector-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Receives metrics AND logs from the FastAPI app over gRPC (port 4317),
# batches them, then forwards to Axiom over HTTPS.
# ─────────────────────────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlphttp/axiom:
    endpoint: "https://api.axiom.co"
    headers:
      Authorization: "Bearer ${env:AXIOM_TOKEN}"
      X-Axiom-Dataset: "${env:AXIOM_DATASET}"

  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlphttp/axiom, debug]

    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlphttp/axiom, debug]