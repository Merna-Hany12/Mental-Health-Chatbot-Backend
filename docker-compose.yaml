version: '3.8'

services:

  # ── 1. FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Tells the OTel SDK inside the app to send metrics to the collector container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - otel-collector

  # ── 2. OTel Collector sidecar ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"   # gRPC — receives metrics from the app
    env_file:
      - .env          # passes AXIOM_TOKEN and AXIOM_DATASET into the collector